name: Windows portable package

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Portable package version
        required: true
        default: 0.2.0

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || '0.2.0-ci' }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install frozen uv tool
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - name: Validate one-click portable contract and immutable locks
        shell: pwsh
        run: |
          uv lock --check
          python tts_more\tests\test_portable_integration.py -v
          if (-not (Select-String -LiteralPath Start.cmd -Pattern 'Invoke-PortableStart.ps1' -Quiet)) { throw 'Start.cmd bypasses the portable controller' }
          if (-not (Test-Path -LiteralPath '使用说明-先看这里.txt' -PathType Leaf)) { throw 'portable root guide is missing' }
      - name: Build bootstrap and prove full is prohibited
        shell: pwsh
        env:
          TTS_MORE_BUILD_PYTHON: python
        run: |
          .\Build-Package.ps1 -Profile Bootstrap -Device CPU -Version $env:PACKAGE_VERSION
          $zip = @(Get-ChildItem artifacts\portable\bootstrap\*.zip)
          if ($zip.Count -ne 1) { throw "expected exactly one bootstrap ZIP" }
          python tts_more\portable_packages.py audit-release --zip $zip[0].FullName
          $blocked = $false
          try { .\Build-Package.ps1 -Profile Full -Device CPU -Version $env:PACKAGE_VERSION } catch { $blocked = $_.Exception.Message -match "profile=full" }
          if (!$blocked) { throw "full profile was not blocked in GitHub Actions" }
      - uses: actions/upload-artifact@v7
        with:
          name: indextts-windows-bootstrap
          if-no-files-found: error
          path: artifacts/portable/bootstrap/*

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: indextts-windows-bootstrap
          path: release-assets
      - name: Publish bootstrap assets only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if find release-assets -type f -name '*-full.zip' | grep -q .; then exit 1; fi
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
